name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install -g @vscode/vsce

      - name: Install dev dependencies
        run: npm ci

      - name: Build vendored libraries (cytoscape, echarts, stdlib bundle, …)
        run: npm run build:vendor

      - name: Package extension
        run: vsce package -o flatppl-0.1.0-nightly.vsix --no-git-tag-version

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatppl-nightly
          path: flatppl-0.1.0-nightly.vsix

      - name: Update nightly release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: flatppl-0.1.0-nightly.vsix
          body: |
            Nightly build of the FlatPPL VS Code extension.
            Built from commit ${{ github.sha }}.

            Install with:
            ```
            curl -L https://github.com/${{ github.repository }}/releases/download/nightly/flatppl-0.1.0-nightly.vsix -o flatppl-0.1.0-nightly.vsix
            code --install-extension flatppl-0.1.0-nightly.vsix
            ```
