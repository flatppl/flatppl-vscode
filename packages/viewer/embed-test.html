<!DOCTYPE html>
<!--
  Test embed page for @flatppl/viewer — local smoke test that the
  viewer loads and renders correctly outside a VS Code webview, and
  reference template for online embedders (rosetta-stone, the
  flatppl-design site, …) to copy from. Not part of any published
  artifact; lives in the repo so changes to the viewer can be
  verified end-to-end without an extension reload.

  The page expects sibling vendored dependencies under ./vendor/ —
  cytoscape / dagre / echarts / engine bundle / sampler-worker / viewer.
  A small build step (or symlink) pulls them in. For local dev:

      cd packages/viewer
      mkdir -p vendor
      cd vendor
      ln -s ../../vscode-extension/lib/cytoscape.min.js .
      ln -s ../../vscode-extension/lib/dagre.min.js .
      ln -s ../../vscode-extension/lib/cytoscape-dagre.js .
      ln -s ../../vscode-extension/lib/cytoscape-layers.min.js .
      ln -s ../../vscode-extension/lib/cytoscape-bubblesets.min.js .
      ln -s ../../vscode-extension/lib/echarts.min.js .
      ln -s ../../vscode-extension/lib/engine.min.js .
      ln -s ../../vscode-extension/lib/sampler-worker.min.js .
      ln -s ../src/viewer.js .

  Then serve packages/viewer/ over HTTP (e.g. `python3 -m http.server`)
  and open embed-test.html. The page renders a sample FlatPPL module
  inline; the source mirrors flatppl-examples/bayesian_inference_2,
  exercising the full classifier pipeline (disintegrate → likelihood
  → bayesupdate posterior).
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlatPPL viewer (embed test)</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #1e1e1e;
      color: #cccccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 100%; height: 100%;
    }
    #flatppl-viewer-root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="flatppl-viewer-root"></div>

  <script src="vendor/cytoscape.min.js"></script>
  <script src="vendor/dagre.min.js"></script>
  <script src="vendor/cytoscape-dagre.js"></script>
  <script src="vendor/cytoscape-layers.min.js"></script>
  <script src="vendor/cytoscape-bubblesets.min.js"></script>
  <script src="vendor/echarts.min.js"></script>
  <script src="vendor/engine.min.js"></script>
  <script>
    // Configure the viewer before it loads. Same shape as the VS Code
    // bootstrap; the only required field today is the URL of the
    // sampler-worker bundle.
    window.__FLATPPL_CONFIG__ = {
      samplerWorkerUrl: new URL('vendor/sampler-worker.min.js', document.baseURI).href,
    };
  </script>
  <script src="vendor/viewer.js"></script>
  <script>
    // Standalone embed bootstrap. The auto-mount branch in viewer.js
    // sees the #flatppl-viewer-root marker and mounts inside it with
    // an empty host adapter (no IDE, no setTitle / revealSourceLine,
    // no persisted state). We push an initial source via update() so
    // the viewer renders something on first load.
    // Sample source: bayesian_inference_2 from flatppl-examples,
    // verbatim. Builds a joint model, disintegrates it into a
    // forward kernel and prior, evaluates a likelihood at observed
    // data, and constructs the unnormalised posterior. Exercises the
    // full classifier pipeline (lawof / functionof / disintegrate /
    // likelihoodof / bayesupdate) — a good smoke test that the
    // standalone embed flow matches the VS Code wrapper.
    var SAMPLE_SOURCE = [
      '# A simple Bayesian example using structural disintegration: build',
      '# the joint distribution first, then disintegrate to extract the',
      '# forward kernel and prior.',
      '',
      '# Prior distributions',
      'theta1_dist = Normal(mu = 0.0, sigma = 1.0)',
      'theta2_dist = Exponential(rate = 1.0)',
      '',
      '# Prior variates',
      'theta1 = draw(theta1_dist)',
      'theta2 = draw(theta2_dist)',
      '',
      'c = 5.0',
      '',
      'f_a = functionof(c * _par_, par = _par_)',
      'f_b = fn(abs(_) * _)',
      '',
      '# Deterministic transform',
      'a = f_a(par = theta1)',
      'b = f_b(theta1, theta2)',
      '',
      '# IID observations from the forward model',
      'obs = draw(iid(Normal(mu = a, sigma = b), 10))',
      '',
      '# Joint distribution over parameters and observations',
      'joint_model = lawof(record(theta1 = theta1, theta2 = theta2, obs = obs))',
      '',
      '# Structural disintegration',
      'forward_kernel, prior = disintegrate(["obs"], joint_model)',
      '',
      '# Observed data',
      'observed_data = [1.2, 3.4, 5.1, 2.8, 4.0, 3.7, 5.5, 2.1, 4.3, 3.9]',
      '',
      '# Likelihood',
      'L = likelihoodof(forward_kernel, record(obs = observed_data))',
      '',
      '# Non-normalized posterior',
      'posterior = bayesupdate(L, prior)',
      '',
      '# Log-density evaluation as a first-class binding. Per prior atom',
      '# this gives logp(observed_data | theta1, theta2) — same primitive',
      '# bayesupdate uses, exposed as a scalar histogram-able binding.',
      'obs_dist = lawof(record(obs = obs))',
      'lp_obs = logdensityof(obs_dist, record(obs = observed_data))',
      'd_obs  = densityof(obs_dist, record(obs = observed_data))',
      '',
      '# Deterministic record: every leaf is a literal, so the plot pane',
      '# renders the surface form as text rather than per-field histograms.',
      'det_record = record(a = 1.5, b = 2.5, xs = observed_data)',
      '',
      '# Preset bindings — fixed (theta1, theta2) value pairs the profile-',
      '# plot UI offers in its preset dropdown for L / forward_kernel.',
      '# pars1 sits near the MLE region (peak of the log-likelihood);',
      '# pars2 picks a different point so the user can compare.',
      'pars1 = record(theta1 = 1.4, theta2 = 1.0)',
      'pars2 = record(theta1 = 0.5, theta2 = 2.0)',
      '',
      '# Preset bindings for f_b = fn(abs(_) * _) — the arg1/arg2 holes',
      '# get auto-named after fn lowering. Two arbitrary value pairs.',
      'some_args1 = record(arg1 = 2.0, arg2 = 1.5)',
      'some_args2 = record(arg1 = -1.0, arg2 = 0.5)',
      '',
    ].join('\n');

    // Auto-mount runs at DOMContentLoaded. We hand the source to the
    // (already-mounted) viewer instance via postMessage — the same
    // channel VS Code uses, so no extra API is needed. For a more
    // direct integration, hosts can call FlatPPLViewer.mount(...)
    // themselves with opts.source set.
    //
    // Use 'showModule' (rather than 'sourceUpdate' with a single
    // target) so the DAG renders the WHOLE module — sibling bindings
    // like det_record / lp_obs / d_obs that aren't ancestors of any
    // particular target stay visible. The user can click any node
    // to drill into a sub-DAG view.
    document.addEventListener('DOMContentLoaded', function() {
      window.postMessage({
        type: 'showModule',
        source: SAMPLE_SOURCE,
        pushHistory: false,
      }, '*');
    });
  </script>
</body>
</html>
